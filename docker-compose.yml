version: '3.8'

services:
  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: ejemplo_web
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./web/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./web/certs:/etc/nginx/certs:ro
    networks:
      ejemplo_net:
        ipv4_address: 10.21.21.10
    restart: unless-stopped

  app:
    build:
      context: ./app
      dockerfile: Dockerfile
    container_name: ejemplo_app
    depends_on:
      - db
    environment:
      # Inyectamos las variables que tu PHP está esperando leer con getenv()
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=ejemplo_db
      - DB_USERNAME=ejemplo_user
      - DB_PASSWORD=ejemplo_pass123
    volumes:
      - ./app/src:/var/www/html
      - ./app/apache-vhost.conf:/etc/apache2/sites-available/000-default.conf:ro
    networks:
      ejemplo_net:
        ipv4_address: 10.21.21.20
    restart: unless-stopped

  db:
    image: mysql:8.0
    container_name: ejemplo_db
    command: --default-authentication-plugin=mysql_native_password
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: ejemplo_db
      MYSQL_USER: ejemplo_user
      MYSQL_PASSWORD: ejemplo_pass123
    volumes:
      - db_data:/var/lib/mysql
      - ./db/init:/docker-entrypoint-initdb.d:ro
    networks:
      ejemplo_net:
        ipv4_address: 10.21.21.30
    restart: unless-stopped

networks:
  ejemplo_net:
    driver: bridge
    ipam:
      config:
        - subnet: 10.21.21.0/24

volumes:
  db_data:
